{% extends "base.html" %}

{% block content %}
<style>
  .landing-shell {
    min-height: calc(100dvh - 180px);
    display: grid;
    place-items: center;
  }
  .landing-hero {
    width: 100%;
    max-width: 760px;
    text-align: center;
    display: grid;
    gap: 18px;
    padding: 40px 0 56px;
  }
  .landing-hero h1 {
    margin: 0;
    font-size: clamp(36px, 6vw, 56px);
    line-height: 1.04;
    letter-spacing: -0.04em;
  }
  .landing-hero p {
    margin: 0 auto;
    max-width: 620px;
    color: var(--text-secondary);
    font-size: 17px;
    line-height: 1.9;
  }
  .landing-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  @media (max-width: 640px) {
    .landing-shell {
      min-height: calc(100dvh - 140px);
    }
    .landing-hero {
      padding: 24px 0 40px;
      text-align: left;
    }
    .landing-hero p {
      margin: 0;
      font-size: 16px;
    }
    .landing-actions {
      justify-content: flex-start;
    }
  }
</style>

<section class="landing-shell">
  <div class="landing-hero">
    <h1>每日 AI 持仓分析，收盘后自动送达</h1>
    <p>添加自选股后，系统会在每日收盘后自动分析，并把报告发送到你的邮箱。</p>
    <div class="landing-actions">
      <a class="button" href="/register">立即注册</a>
      <a class="button secondary" href="/login">登录</a>
    </div>
  </div>
</section>
{% endblock %}

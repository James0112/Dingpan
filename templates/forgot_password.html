{% extends "base.html" %}

{% block content %}
<section class="card" style="max-width:520px;margin:0 auto;">
  <h1 style="margin:0 0 10px;">忘记密码</h1>
  <p class="muted" style="margin:0 0 20px;">输入注册邮箱。如果该邮箱已存在，我们会发送一封重置密码邮件。</p>
  <form class="stack" id="forgot-password-form">
    <div class="field">
      <label for="email">邮箱</label>
      <input id="email" name="email" type="email" autocomplete="email" required>
    </div>
    <div class="message" id="forgot-password-message"></div>
    <button type="submit">发送重置邮件</button>
  </form>
</section>
<script>
  const form = document.getElementById("forgot-password-form");
  const message = document.getElementById("forgot-password-message");
  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    message.textContent = "正在发送...";
    const response = await fetch("/api/auth/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: form.email.value.trim() })
    });
    const data = await response.json().catch(() => ({}));
    message.textContent = data.message || data.detail || "如果该邮箱已注册，您将收到重置密码邮件。";
  });
</script>
{% endblock %}

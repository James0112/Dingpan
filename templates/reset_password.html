{% extends "base.html" %}

{% block content %}
<section class="card" style="max-width:520px;margin:0 auto;">
  <h1 style="margin:0 0 10px;">重置密码</h1>
  <p class="muted" style="margin:0 0 20px;">请设置新的登录密码。</p>
  <form class="stack" id="reset-password-form">
    <input type="hidden" id="token" name="token" value="{{ token }}">
    <div class="field">
      <label for="password">新密码</label>
      <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
    </div>
    <div class="field">
      <label for="password_confirm">确认新密码</label>
      <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" minlength="8" required>
    </div>
    <div class="message" id="reset-password-message"></div>
    <button type="submit">更新密码</button>
  </form>
</section>
<script>
  const form = document.getElementById("reset-password-form");
  const message = document.getElementById("reset-password-message");
  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    if (form.password.value !== form.password_confirm.value) {
      message.textContent = "两次输入的密码不一致";
      return;
    }
    message.textContent = "正在更新...";
    const response = await fetch("/api/auth/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        token: form.token.value,
        password: form.password.value
      })
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      message.textContent = data.detail || "重置失败";
      return;
    }
    message.textContent = data.message || "密码已更新，请返回登录。";
    setTimeout(() => {
      window.location.href = "/login";
    }, 1200);
  });
</script>
{% endblock %}
